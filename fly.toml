app = "gigi-stream"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"

[deploy]
  strategy = "rolling"

[env]
  PORT = "3142"
  GIGI_DATA_DIR = "/data"
  # INGEST source containment root (fail-closed: without this, INGEST
  # from server-side files is disabled engine-wide). Source paths in
  # `INGEST … FROM '<p>'` are RELATIVE to this directory; absolute /
  # '..' / drive-prefixed forms are rejected before any file access.
  # The harvest pipeline drops its NPZ files under /data/ingest on the
  # mounted volume — capability kept, bounded.
  GIGI_INGEST_DIR = "/data/ingest"
  # Tigris S3 snapshot store — AWS_ACCESS_KEY_ID, AWS_SECRET_ACCESS_KEY,
  # AWS_ENDPOINT_URL_S3, AWS_REGION, and BUCKET_NAME are already set as Fly secrets
  # by `flyctl storage create`. TIGRIS_BUCKET_NAME here matches Fly's BUCKET_NAME secret.
  TIGRIS_BUCKET_NAME = "gigi-snapshots"
  # App-bundle bootstrap manifest. On every startup, after WAL replay +
  # Tigris pull + system bundles, gigi-stream checks each entry: if the
  # bundle is missing, it creates it from this schema. Idempotent — never
  # touches an existing bundle. Add an entry here for any app-required
  # bundle that must survive a Fly volume loss / cross-machine reschedule.
  # `seed_env` points at a Fly secret (32-byte hex). Set it via:
  #   flyctl secrets set JG_KV_ENCRYPTION_SEED=$(openssl rand -hex 32)
  # If unset, the bootstrap falls back to a per-startup random seed —
  # which is fine for an empty bundle but breaks ciphertext recovery
  # across redeploys. Production MUST set the secret.
  #
  # `payload` is OPAQUE (AEAD) — chat content is the sensitive payload
  # and we want IND-CPA + tamper detection on it. `key` stays plaintext
  # because it's the BASE lookup field. `kind`, `expires_at`, `updated_at`
  # are metadata — leaving them plaintext lets bitmap indexes work and
  # the small frequency-leak risk on a low-cardinality `kind` is
  # acceptable for chat-shape metadata.
  GIGI_APP_BUNDLES = '''[{"name":"jg_kv","seed_env":"JG_KV_ENCRYPTION_SEED","base":[{"name":"key","type":"text"}],"fiber":[{"name":"kind","type":"text","indexed":true},{"name":"payload","type":"text","encrypted":"opaque"},{"name":"expires_at","type":"timestamp","indexed":true},{"name":"updated_at","type":"timestamp","indexed":true}]}]'''

  # Public-read bundle allowlist. Bundles named here are readable via
  # POST /v1/public/gql WITHOUT an api key, under the strict read-verb
  # whitelist in validate_public_stmt (SHOW BUNDLES, HEALTH, SECTION,
  # DESCRIBE, EXISTS SECTION, COVER, INTEGRATE, SELECT). Writes, admin
  # verbs, and non-listed bundles still 401. The GIGI Builds exercise
  # pages hit this endpoint from the browser — no key handoff needed.
  #
  # UNSET or empty ⇒ the /v1/public/gql route is not registered at all
  # (kill switch — remove this line and redeploy to disable public
  # access instantly).
  GIGI_PUBLIC_BUNDLES = "stations,sensors,chembl,tetmesh_demo"

[http_service]
  internal_port = 3142
  force_https = true
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1

[checks]
  [checks.readiness]
    type = "http"
    port = 3142
    path = "/v1/health"
    interval = "5s"
    timeout = "3s"
    grace_period = "900s"

[[vm]]
  memory = "32gb"
  cpu_kind = "performance"
  cpus = 4
  restart_policy = "always"

[mounts]
  source = "gigi_data"
  destination = "/data"
