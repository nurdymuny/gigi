# Branch VII — Cognitive Geometry verbs JTBD demo. Two-bundle
# comparison (peaceful real sensor data vs synthetic volatile
# trace) exercising CAPACITY / HORIZON / DEPTH end-to-end with
# concrete routing decisions printed for each bundle.
[[bin]]
name = "cognitive_geometry_demo"
path = "examples/cognitive_geometry_demo.rs"
required-features = ["kahler"]

[[bin]]
name = "dream_demo"
path = "examples/dream_demo.rs"
required-features = ["kahler"]

[[bin]]
name = "dream_anisotropic_demo"
path = "examples/dream_anisotropic_demo.rs"
required-features = ["kahler"]

[[bin]]
name = "brain_tour_demo"
path = "examples/brain_tour_demo.rs"
required-features = ["kahler"]

# Sharding demo on real public data (Palmer Penguins, CC-0).
# Reads gigi::sharded::* end-to-end on a 3-species bundle:
# unsharded baseline → hash-shard with n=3 → check T3 invariance →
# explicit Möbius cross-chart loop → det(H) = -1 (T13).
[[bin]]
name = "sharding_penguins"
path = "examples/sharding_penguins.rs"
required-features = ["kahler", "sharded"]

# IMAGINE demo on real public data (NOAA Mauna Loa CO₂, public domain).
# Three live trajectory shapes against a 60-month observation bundle:
# default-budget honest refusal → constant-K calm projection → the
# is_imagined() audit on every returned point.
[[bin]]
name = "imagine_co2_forward"
path = "examples/imagine_co2_forward.rs"
required-features = ["kahler", "imagine"]

# Causal States Phase 3 — empirical (α, β)-scan for the paper.
# Generates the scatter-plot CSV + summary report. Smooth-regime closed-
# form Eq 6.4 residual goes to machine precision; sofic anchor (Even
# Process) lands KL Divergent at TV=1. See examples/causal_states_scan.rs.
[[bin]]
name = "causal_states_scan"
path = "examples/causal_states_scan.rs"
required-features = ["causal_states"]

# Causal States Phase 4.3 — orthogonality scan (TH1 empirical evidence).
# Writes (H[X], |Ω|) across iid Bernoulli, symmetric HMM, and Even
# Process. Demonstrates two processes with matched H[X] can have
# opposite |Ω|. See examples/causal_states_orthogonality.rs.
[[bin]]
name = "causal_states_orthogonality"
path = "examples/causal_states_orthogonality.rs"
required-features = ["causal_states"]

# Causal States Phase 4.4 — classifier audit (confusion matrix).
# Generates the formal regime-classifier confusion matrix on labeled
# processes for the paper's appendix. See
# examples/causal_states_classifier_audit.rs.
[[bin]]
name = "causal_states_classifier_audit"
path = "examples/causal_states_classifier_audit.rs"
required-features = ["causal_states"]

# Local profile of GIBBS_SAMPLE β=2.5 N_SWEEPS=200 SEED=20260616 on the
# truncated-icosahedron buckyball. Times the production sweep plus three
# micro-benches (staple walker, KP draw, mutex lock) so the per-phase
# cost breakdown is legible. Run with:
#   cargo run --release --features halcyon --example bench_thermalization
[[example]]
name = "bench_thermalization"
path = "examples/bench_thermalization.rs"
required-features = ["halcyon"]

# Sprint A baseline harness for the face_edges + measurement_history hoist.
# 3 warmup + 5 timed iterations of GIBBS_SAMPLE β=2.5 N_SWEEPS=200
# SEED=20260616 on the buckyball; reports wall-clock mean/min plus the
# final MeanPlaquette[199] checksum used for the bit-identity receipt. Run:
#   cargo run --release --features halcyon --example bench_thermalization_baseline
[[example]]
name = "bench_thermalization_baseline"
path = "examples/bench_thermalization_baseline.rs"
required-features = ["halcyon"]

# Perfect-Identity Corollary 4.2 — IGS GNSS Earth-geodesic transport.
# Parallel-transports an SU(2) frame around the great-circle triangle
# formed by IGS stations PIE1 / KOKB / ALGO on a cubed-sphere (C=32) and
# compares the holonomy rotation angle against Girard's analytic excess
# A/R². Writes papers/perfect_identity/empirical/gnss_geodesic_results.json.
# Run with:
#   cargo run --release --features lattice --example gnss_geodesic
[[example]]
name = "gnss_geodesic"
path = "examples/gnss_geodesic.rs"
required-features = ["lattice"]

[dev-dependencies]
rand = "0.8"
# `tempfile` is declared under `[dependencies]` (see comment there);
# kept available to dev-dep contexts automatically via cargo's
# dependency resolution — no separate dev-dep entry needed.
# In-process axum router driving for the TDD-HAL-II.6 HTTP gate. Tower
# is already a transitive dep through axum; surfacing it directly gives
# the test crate `tower::ServiceExt::oneshot`. `http-body-util` lets the
# same test collect the response body without spinning up a real
# listener.
tower = { version = "0.5", features = ["util"] }
http-body-util = "0.1"
