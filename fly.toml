app = "gigi-stream"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "3142"
  GIGI_DATA_DIR = "/data"

[http_service]
  internal_port = 3142
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 1

[checks]
  [checks.health]
    type = "http"
    port = 3142
    path = "/v1/health"
    interval = "30s"
    timeout = "5s"

[[vm]]
  memory = "32gb"
  cpu_kind = "performance"
  cpus = 4

[mounts]
  source = "gigi_data"
  destination = "/data"
