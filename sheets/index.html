<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!--
      Security headers (meta-tag fallback; prefer host/edge HTTP headers).

      CSP — `default-src 'self'` denies everything we don't enumerate.
        - `connect-src` allows localhost (dev) + any HTTPS origin so the
          engine URL configured via VITE_GIGI_BASE_URL works without
          edits to this file. Tighten to a specific host at deploy time
          via HTTP headers if you don't want the `https:` catch-all.
        - `style-src 'self' 'unsafe-inline'` permits the inline styles
          React inserts; tightening this needs a nonce strategy.
        - `frame-ancestors 'self'` — same-origin embedding only. Hosts
          who want to surface the Sheets UI inside another property
          should override this at the edge (e.g. `frame-ancestors 'self'
          https://docs.davisgeometric.com`) rather than reopening the
          wildcard, which would invite clickjacking.
        - `img-src` allows data: URIs (icon svgs encoded inline) plus self.
      Referrer-Policy keeps full URLs from leaking to external resources.
    -->
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self' data:; connect-src 'self' http://localhost:3142 ws://localhost:3142 https: wss:; frame-ancestors 'self'; base-uri 'self'; form-action 'self'"
    />
    <meta name="referrer" content="strict-origin-when-cross-origin" />
    <title>GIGI Sheets · Davis Geometric</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
