<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <title>GIGI — Geometric Intrinsic Global Index</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body { background: #06060A; font-family: 'DM Sans', system-ui, -apple-system, sans-serif; -webkit-font-smoothing: antialiased; }
      /* ── Nav ── */
      .gigi-nav { position: sticky; top: 0; z-index: 100; background: rgba(6,6,10,0.92); backdrop-filter: blur(12px); border-bottom: 1px solid rgba(255,255,255,0.04); }
      .gigi-nav-bar { max-width: 1100px; margin: 0 auto; display: flex; align-items: center; gap: 10px; padding: 10px 20px; }
      .gigi-nav-links { display: flex; gap: 0px; flex: 1; flex-wrap: nowrap; overflow-x: hidden; min-width: 0; }
      .gigi-nav-btn { background: none; border: none; cursor: pointer; font-size: 10.5px; font-weight: 500; padding: 6px 7px; border-radius: 6px; transition: color 0.15s, background 0.15s; white-space: nowrap; }
      .gigi-nav-btn:hover { background: rgba(255,255,255,0.04); }
      .gigi-nav-ext { display: flex; gap: 6px; flex-shrink: 0; }
      .gigi-nav-pill { font-size: 10px; font-weight: 700; letter-spacing: 0.06em; color: #40E8A0; border: 1px solid rgba(64,232,160,0.2); border-radius: 5px; padding: 4px 10px; text-decoration: none; white-space: nowrap; transition: background 0.15s; }
      .gigi-nav-pill:hover { background: rgba(64,232,160,0.08); }
      .gigi-nav-ver { font-size: 9px; color: #303040; white-space: nowrap; flex-shrink: 0; }
      .gigi-hamburger { display: none; background: none; border: none; cursor: pointer; padding: 6px; flex-direction: column; gap: 4px; flex-shrink: 0; }
      .gigi-mobile-menu { display: none; }
      /* ── Responsive ── */
      @media (max-width: 900px) {
        .gigi-nav-links, .gigi-nav-ext, .gigi-nav-ver { display: none; }
        .gigi-hamburger { display: flex; margin-left: auto; }
        .gigi-mobile-menu { display: block; background: rgba(6,6,10,0.97); border-bottom: 1px solid rgba(255,255,255,0.04); }
      }
      @media (max-width: 768px) {
        [style*="grid-template-columns"] { grid-template-columns: 1fr 1fr !important; }
        [style*="max-width: 940"] { padding-left: 16px !important; padding-right: 16px !important; }
      }
      @media (max-width: 480px) {
        [style*="grid-template-columns"] { grid-template-columns: 1fr !important; }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script src="https://cdn.plot.ly/plotly-2.35.0.min.js" charset="utf-8"></script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
